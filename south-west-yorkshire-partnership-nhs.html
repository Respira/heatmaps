                }

                const ratio = Math.sqrt(users) / Math.sqrt(maxUsers);
                const r = Math.round(219 + (30 - 219) * ratio);
                const g = Math.round(234 + (58 - 234) * ratio);
                const b = Math.round(254 + (95 - 254) * ratio);
                return `rgb(${r}, ${g}, ${b})`;

                    const expanded = hidden[0] && hidden[0].classList.contains('show-all');
                    hidden.forEach(row => row.classList.toggle('show-all'));
                    btn.textContent = expanded ? `Show all ${sorted.length} cities` : `Show top ${VISIBLE_ROWS} only`;
                });
                document.querySelector('.city-list').appendChild(btn);
            }
        } else {
            // No data overlay
            const overlay = document.createElement('div');
            overlay.className = 'no-data-overlay';
            overlay.innerHTML = '<h2>No user data</h2><p>No geographic data found for this client and date range.</p>';
            document.body.appendChild(overlay);
        }

        // Legend with gradient bar
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            if (cityData.length === 0) {
                div.innerHTML = '<h4>No data</h4>';
                return div;
            }
            div.innerHTML = `
                <h4>User density</h4>
                <div class="legend-gradient">
                    <span>Fewer</span>
                    <div class="legend-gradient-bar"></div>
                    <span>More</span>
                </div>
            `;
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
