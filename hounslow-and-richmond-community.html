        // Initialise map centered on UK
        const map = L.map('map', {
            zoomControl: true,
            attributionControl: true
        }).setView([53.5, -2.5], 6);

        // CartoDB Positron tiles (clean, minimal look)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Color scale: light blue to deep navy
        function getColor(users, maxUsers) {
            const ratio = Math.min(users / maxUsers, 1);
            // Interpolate from #93c5fd (light blue) to #1e3a5f (deep navy)
            const r = Math.round(147 + (30 - 147) * ratio);
            const g = Math.round(197 + (58 - 197) * ratio);
            const b = Math.round(253 + (95 - 253) * ratio);
            return `rgb(${r}, ${g}, ${b})`;
        }

        // Radius scale: 8px minimum, 40px maximum
        function getRadius(users, maxUsers) {
            const ratio = Math.min(users / maxUsers, 1);
            return 8 + ratio * 32;
        }

        // Render markers
        if (cityData.length > 0) {
            const maxUsers = Math.max(...cityData.map(d => d.users));
            let matched = 0;
            let skipped = [];

            cityData.forEach(item => {
                const coords = cityCoords[item.city];
                if (!coords) {
                    skipped.push(item.city);
                    console.warn(`City not in lookup: "${item.city}" (${item.users} users)`);
                    return;
                }

                matched++;
                const circle = L.circleMarker(coords, {
                    radius: getRadius(item.users, maxUsers),
                    fillColor: getColor(item.users, maxUsers),
                    fillOpacity: 0.75,
                    color: '#0f4c81',
                    weight: 1.5,
                    opacity: 0.9
                }).addTo(map);

                circle.bindTooltip(
                    `<strong>${item.city}</strong><br>${item.users} user${item.users !== 1 ? 's' : ''}`,
                    { className: 'tooltip-custom', direction: 'top', offset: [0, -8] }
                );
            });

            if (skipped.length > 0) {
                console.log(`Skipped ${skipped.length} cities not in lookup:`, skipped);
            }

            // Auto-fit bounds to markers if we have data
            if (matched > 1) {
                const bounds = cityData
                    .filter(d => cityCoords[d.city])
                    .map(d => cityCoords[d.city]);
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 10 });
            } else if (matched === 1) {
                const single = cityData.find(d => cityCoords[d.city]);
                if (single) {
                    map.setView(cityCoords[single.city], 9);
                }
            }
        } else {
            // No data overlay
            const overlay = document.createElement('div');
            overlay.className = 'no-data-overlay';
            overlay.innerHTML = '<h2>No user data</h2><p>No geographic data found for this client and date range.</p>';
            document.body.appendChild(overlay);
        }

        // Legend
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            if (cityData.length === 0) {
                div.innerHTML = '<h4>No data</h4>';
                return div;
            }
            const maxUsers = Math.max(...cityData.map(d => d.users));
            const low = Math.max(1, Math.round(maxUsers * 0.2));
            const mid = Math.round(maxUsers * 0.5);
            const high = maxUsers;

            div.innerHTML = `
                <h4>Users per city</h4>
                <div class="legend-row">
                    <span class="legend-circle" style="width:12px;height:12px;background:${getColor(low, maxUsers)}"></span>
                    <span>${low}</span>
                </div>
                <div class="legend-row">
                    <span class="legend-circle" style="width:18px;height:18px;background:${getColor(mid, maxUsers)}"></span>
                    <span>${mid}</span>
                </div>
                <div class="legend-row">
                    <span class="legend-circle" style="width:24px;height:24px;background:${getColor(high, maxUsers)}"></span>
                    <span>${high}</span>
                </div>
            `;
            return div;
        };
        legend.addTo(map);
