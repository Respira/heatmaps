<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Heatmaps — SuperPenguin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px;
        }
        .container {
            max-width: 640px;
            width: 100%;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #0f4c81, #1a73e8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
            flex-shrink: 0;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
        }
        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 2px;
        }
        .list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .list a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            text-decoration: none;
            color: #1a1a2e;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .list a:hover {
            border-color: #1a73e8;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.1);
        }
        .list .icon {
            width: 32px;
            height: 32px;
            background: #eef4ff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }
        .list .name {
            font-weight: 500;
            font-size: 15px;
        }
        .empty {
            text-align: center;
            padding: 48px 24px;
            color: #94a3b8;
            font-size: 14px;
        }
        .footer {
            margin-top: 48px;
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">SP</div>
            <div>
                <h1>Client Heatmaps</h1>
                <div class="subtitle">SuperPenguin geographic user distribution maps</div>
            </div>
        </div>
        <div class="list" id="heatmap-list">
            <div class="empty">Loading...</div>
        </div>
        <div class="footer">Generated by SuperTron</div>
    </div>

    <script>
        // Auto-discover heatmap HTML files via GitHub Pages directory listing
        // Since GitHub Pages doesn't support directory listing, we maintain a manifest
        const heatmaps = [
            { slug: "northamptonshire-nhs", name: "Northamptonshire NHS" },
            { slug: "swansea-bay", name: "Swansea Bay" }
        ];

        const list = document.getElementById('heatmap-list');

        if (heatmaps.length === 0) {
            list.innerHTML = '<div class="empty">No heatmaps generated yet.</div>';
        } else {
            list.innerHTML = heatmaps
                .sort((a, b) => a.name.localeCompare(b.name))
                .map(h => `
                    <a href="${h.slug}.html">
                        <div class="icon">&#x1F5FA;</div>
                        <div class="name">${h.name}</div>
                    </a>
                `).join('');
        }
    </script>
</body>
</html>
