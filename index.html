<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Heatmaps — SuperPenguin</title>

    <!-- Open Graph / Link Preview -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Client Heatmaps — SuperPenguin">
    <meta property="og:description" content="Interactive maps showing geographic distribution of SuperPenguin users across NHS trusts in the UK.">
    <meta property="og:image" content="https://respira.github.io/heatmaps/og-image.png">
    <meta property="og:url" content="https://respira.github.io/heatmaps/">

    <!-- Twitter / Slack -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Client Heatmaps — SuperPenguin">
    <meta name="twitter:description" content="Interactive maps showing geographic distribution of SuperPenguin users across NHS trusts in the UK.">
    <meta name="twitter:image" content="https://respira.github.io/heatmaps/og-image.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px;
        }
        .container {
            max-width: 640px;
            width: 100%;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #0f4c81, #1a73e8);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
            flex-shrink: 0;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
        }
        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 2px;
        }
        .list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .list a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            text-decoration: none;
            color: #1a1a2e;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .list a:hover {
            border-color: #1a73e8;
            box-shadow: 0 2px 8px rgba(26, 115, 232, 0.1);
        }
        .list .icon {
            width: 32px;
            height: 32px;
            background: #eef4ff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }
        .list .name {
            font-weight: 500;
            font-size: 15px;
        }
        .list .client-number {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            min-width: 28px;
        }
        .list a.highlight {
            background: linear-gradient(135deg, #eef4ff, #f0f7ff);
            border-color: #1a73e8;
        }
        .list a.highlight .icon {
            background: linear-gradient(135deg, #0f4c81, #1a73e8);
            color: white;
            font-size: 18px;
        }
        .list a.highlight .name {
            font-weight: 600;
            font-size: 16px;
            color: #0f4c81;
        }
        .empty {
            text-align: center;
            padding: 48px 24px;
            color: #94a3b8;
            font-size: 14px;
        }
        .footer {
            margin-top: 48px;
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">SP</div>
            <div>
                <h1>Client Heatmaps</h1>
                <div class="subtitle">SuperPenguin geographic user distribution maps</div>
            </div>
        </div>
        <div class="list" id="heatmap-list">
            <div class="empty">Loading...</div>
        </div>
        <div class="footer">Generated by SuperTron &middot; 12 Apr 2026 &middot; 33 clients + aggregate</div>
    </div>

    <script>
        // Manifest maintained by SuperTron /client-heatmap command
        // Each entry: { slug, name, clientNumber }
        // clientNumber "000" = "All UK Clients" aggregate (always first)
        const heatmaps = [
            { slug: "all", name: "All UK Clients (2,931 users, 151 cities)", clientNumber: "000" },
            { slug: "northamptonshire-nhs", name: "Northamptonshire Healthcare NHS Foundation Trust", clientNumber: "001" },
            { slug: "south-west-yorkshire-partnership-nhs", name: "South West Yorkshire Partnership NHS Foundation Trust", clientNumber: "003" },
            { slug: "swansea-bay-health-board-nhs", name: "Swansea Bay University Health Board (Wales)", clientNumber: "004" },
            { slug: "birmingham-community-nhs", name: "Birmingham Community Healthcare NHS Foundation Trust", clientNumber: "005" },
            { slug: "homerton-nhs", name: "Homerton Healthcare NHS Foundation Trust", clientNumber: "006" },
            { slug: "shropshire-community-nhs", name: "Shropshire Community Health NHS Trust", clientNumber: "007" },
            { slug: "essex-partnership-university-nhs", name: "Essex Partnership University NHS Foundation Trust", clientNumber: "008" },
            { slug: "berkshire-nhs", name: "Berkshire Healthcare NHS Foundation Trust", clientNumber: "009" },
            { slug: "alder-hey-childrens-nhs", name: "Alder Hey Children's NHS Foundation Trust", clientNumber: "010" },
            { slug: "hampshire-and-isle-of-wight-nhs", name: "Hampshire and Isle of Wight Healthcare NHS Foundation Trust", clientNumber: "011" },
            { slug: "doncaster-and-bassetlaw-teaching-nhs", name: "Doncaster and Bassetlaw Teaching Hospitals NHS Foundation Trust", clientNumber: "012" },
            { slug: "derbyshire-community-nhs", name: "Derbyshire Community Health Services NHS Foundation Trust", clientNumber: "013" },
            { slug: "cornwall-partnership-nhs", name: "Cornwall Partnership NHS Foundation Trust", clientNumber: "014" },
            { slug: "leeds-community-nhs", name: "Leeds Community Healthcare NHS Trust", clientNumber: "015" },
            { slug: "northern-care-alliance-nhs", name: "Northern Care Alliance NHS Foundation Trust", clientNumber: "017" },
            { slug: "nottinghamshire-nhs", name: "Nottinghamshire Healthcare NHS Foundation Trust", clientNumber: "018" },
            { slug: "newcastle-upon-tyne-nhs", name: "The Newcastle Upon Tyne Hospitals NHS Foundation Trust", clientNumber: "022" },
            { slug: "sussex-community-nhs", name: "Sussex Community NHS Foundation Trust", clientNumber: "023" },
            { slug: "airedale-nhs", name: "Airedale NHS Foundation Trust", clientNumber: "026" },
            { slug: "north-tees-and-hartlepool-nhs", name: "North Tees and Hartlepool NHS Foundation Trust", clientNumber: "030" },
            { slug: "kent-community-nhs", name: "Kent Community Health NHS Foundation Trust", clientNumber: "034" },
            { slug: "kingston-and-richmond-nhs", name: "Kingston and Richmond NHS Foundation Trust", clientNumber: "035" },
            { slug: "sheffield-childrens-nhs", name: "Sheffield Children's NHS Foundation Trust", clientNumber: "038" },
            { slug: "torbay-and-south-devon-nhs", name: "Torbay and South Devon NHS Foundation Trust", clientNumber: "041" },
            { slug: "york-and-scarborough-teaching-nhs", name: "York and Scarborough Teaching Hospitals NHS Foundation Trust", clientNumber: "042" },
            { slug: "aneurin-bevan-university-health-board-nhs", name: "Aneurin Bevan University Health Board (Wales)", clientNumber: "043" },
            { slug: "harrogate-and-district-nhs", name: "Harrogate and District NHS Foundation Trust", clientNumber: "050" },
            { slug: "grampian-nhs", name: "Grampian (Scotland)", clientNumber: "052" },
            { slug: "livewell-southwest", name: "Livewell South West", clientNumber: "053" },
            { slug: "wrightington-wigan-and-leigh-nhs", name: "Wrightington, Wigan and Leigh NHS Foundation Trust", clientNumber: "054" },
            { slug: "belfast-health-and-social-care-trust", name: "Belfast Health and Social Care Trust", clientNumber: "055" },
            { slug: "leicestershire-partnership-nhs", name: "Leicestershire Partnership NHS Trust", clientNumber: "056" },
            { slug: "oxleas-nhs", name: "Oxleas NHS Foundation Trust", clientNumber: "063" }
        ];

        const list = document.getElementById('heatmap-list');

        if (heatmaps.length === 0) {
            list.innerHTML = '<div class="empty">No heatmaps generated yet.</div>';
        } else {
            // Separate "All UK" (clientNumber "000") from individual clients
            const allUk = heatmaps.filter(h => h.clientNumber === '000');
            const clients = heatmaps
                .filter(h => h.clientNumber !== '000')
                .sort((a, b) => a.name.localeCompare(b.name));

            const renderEntry = (h, isHighlight) => {
                const cssClass = isHighlight ? ' class="highlight"' : '';
                const icon = isHighlight ? '&#x1F30D;' : '&#x1F5FA;';
                const numberPrefix = (!isHighlight && h.clientNumber !== '999')
                    ? `<span class="client-number">${h.clientNumber}</span>` : '';
                const displayName = (!isHighlight && h.clientNumber !== '999')
                    ? `${h.clientNumber} &mdash; ${h.name}` : h.name;
                return `
                    <a href="${h.slug}.html"${cssClass}>
                        <div class="icon">${icon}</div>
                        <div class="name">${displayName}</div>
                    </a>
                `;
            };

            const allUkHtml = allUk.map(h => renderEntry(h, true)).join('');
            const clientsHtml = clients.map(h => renderEntry(h, false)).join('');
            list.innerHTML = allUkHtml + clientsHtml;
        }
    </script>
</body>
</html>
